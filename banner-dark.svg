<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="380" viewBox="0 0 1180 380" fill="none" role="img" aria-label="Nandan - Software and AI/ML Engineer">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#0E1A33"/>
      <stop offset="100%" stop-color="#141335"/>
    </linearGradient>
    <radialGradient id="glowPurpleD" cx="82%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSkyD" cx="12%" cy="88%" r="55%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGradD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
      <animate attributeName="x1" values="-1;1" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="ruleD" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <rect width="1180" height="380" rx="24" fill="url(#night)"/>
  <rect width="1180" height="380" rx="24" fill="url(#glowPurpleD)"/>
  <rect width="1180" height="380" rx="24" fill="url(#glowSkyD)"/>
  <rect x="1" y="1" width="1178" height="378" rx="23" fill="none" stroke="#1E293B" stroke-width="1.5"/>

  <!-- stars -->
  <g fill="#A78BFA">
    <circle cx="180" cy="70" r="2.5" opacity="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1010" cy="300" r="3" opacity="0.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="90" r="2" opacity="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#38BDF8">
    <circle cx="90" cy="250" r="2.5" opacity="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="150" r="2" opacity="0.6"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="52" r="1.8" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- terminal card -->
  <g transform="translate(760,96)">
    <rect width="330" height="200" rx="14" fill="#0F1B33" stroke="#243352" stroke-width="1.5"/>
    <rect width="330" height="34" rx="14" fill="#12213D"/>
    <rect y="20" width="330" height="14" fill="#12213D"/>
    <circle cx="22" cy="17" r="5" fill="#FB7185"/>
    <circle cx="42" cy="17" r="5" fill="#FBBF24"/>
    <circle cx="62" cy="17" r="5" fill="#34D399"/>
    <text x="300" y="21" text-anchor="end" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#64748B">bash</text>
    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13">
      <text x="18" y="66" fill="#A78BFA">$ whoami</text>
      <text x="18" y="88" fill="#E2E8F0">nandan</text>
      <text x="18" y="116" fill="#A78BFA">$ stack --list</text>
      <text x="18" y="138" fill="#38BDF8">react · node · python</text>
      <text x="18" y="158" fill="#38BDF8">tensorflow · mongodb</text>
      <text x="18" y="186" fill="#A78BFA">$ status<tspan fill="#E2E8F0"> open to roles</tspan><tspan fill="#38BDF8">_<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
    </g>
  </g>

  <text x="70" y="150" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="72" font-weight="800" fill="url(#nameGradD)">Nandan</text>
  <rect x="72" y="168" width="300" height="5" rx="2.5" fill="url(#ruleD)"/>
  <text x="72" y="210" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="24" font-weight="600" fill="#CBD5E1">Software &amp; AI/ML Engineer</text>
  <text x="72" y="244" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#94A3B8">Full-stack web · Machine learning · Clean, shipped code</text>

  <g font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">
    <g transform="translate(72,272)">
      <rect width="150" height="30" rx="15" fill="#0F1B33" stroke="#243352"/>
      <text x="75" y="20" text-anchor="middle" fill="#38BDF8">B.Tech CSE · AI/ML</text>
    </g>
    <g transform="translate(232,272)">
      <rect width="190" height="30" rx="15" fill="#0F1B33" stroke="#3B2F63"/>
      <text x="95" y="20" text-anchor="middle" fill="#A78BFA">Ex-Salesforce Intern</text>
    </g>
    <g transform="translate(432,272)">
      <rect width="176" height="30" rx="15" fill="#0F1B33" stroke="#243352"/>
      <text x="88" y="20" text-anchor="middle" fill="#38BDF8">Oracle Java SE 17 (OCP)</text>
    </g>
  </g>
</svg>
