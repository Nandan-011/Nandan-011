<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="380" viewBox="0 0 1180 380" fill="none" role="img" aria-label="Nandan - Software and AI/ML Engineer">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="55%" stop-color="#E6F4FF"/>
      <stop offset="100%" stop-color="#E4E9FF"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="82%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSky" cx="12%" cy="88%" r="55%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
      <animate attributeName="x1" values="-1;1" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1180" height="380" rx="24" fill="url(#sky)"/>
  <rect width="1180" height="380" rx="24" fill="url(#glowPurple)"/>
  <rect width="1180" height="380" rx="24" fill="url(#glowSky)"/>
  <rect x="1" y="1" width="1178" height="378" rx="23" fill="none" stroke="#BAE6FD" stroke-width="1.5"/>

  <!-- floating particles -->
  <g fill="#8B5CF6">
    <circle cx="180" cy="70" r="3" opacity="0.5">
      <animate attributeName="cy" values="70;54;70" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1010" cy="300" r="3.5" opacity="0.4">
      <animate attributeName="cy" values="300;282;300" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="7.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="930" cy="90" r="2.5" opacity="0.5">
      <animate attributeName="cy" values="90;76;90" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#0EA5E9">
    <circle cx="90" cy="250" r="3" opacity="0.5">
      <animate attributeName="cy" values="250;234;250" dur="6.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="150" r="2.5" opacity="0.45">
      <animate attributeName="cy" values="150;138;150" dur="5.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- terminal card (right) -->
  <g transform="translate(760,96)">
    <rect width="330" height="200" rx="14" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="1.5"/>
    <rect width="330" height="34" rx="14" fill="#F1F5F9"/>
    <rect y="20" width="330" height="14" fill="#F1F5F9"/>
    <circle cx="22" cy="17" r="5" fill="#FB7185"/>
    <circle cx="42" cy="17" r="5" fill="#FBBF24"/>
    <circle cx="62" cy="17" r="5" fill="#34D399"/>
    <text x="300" y="21" text-anchor="end" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#94A3B8">bash</text>
    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="13">
      <text x="18" y="66" fill="#8B5CF6">$ whoami</text>
      <text x="18" y="88" fill="#0F172A">nandan</text>
      <text x="18" y="116" fill="#8B5CF6">$ stack --list</text>
      <text x="18" y="138" fill="#0EA5E9">react · node · python</text>
      <text x="18" y="158" fill="#0EA5E9">tensorflow · mongodb</text>
      <text x="18" y="186" fill="#8B5CF6">$ status<tspan fill="#0F172A"> open to roles</tspan><tspan fill="#0EA5E9">_<animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
    </g>
  </g>

  <!-- name + tagline (left) -->
  <text x="70" y="150" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="72" font-weight="800" fill="url(#nameGrad)">Nandan</text>
  <rect x="72" y="168" width="300" height="5" rx="2.5" fill="url(#rule)"/>
  <text x="72" y="210" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="24" font-weight="600" fill="#334155">Software &amp; AI/ML Engineer</text>
  <text x="72" y="244" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#64748B">Full-stack web · Machine learning · Clean, shipped code</text>

  <!-- chips -->
  <g font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">
    <g transform="translate(72,272)">
      <rect width="150" height="30" rx="15" fill="#FFFFFF" stroke="#BAE6FD"/>
      <text x="75" y="20" text-anchor="middle" fill="#0284C7">B.Tech CSE · AI/ML</text>
    </g>
    <g transform="translate(232,272)">
      <rect width="190" height="30" rx="15" fill="#FFFFFF" stroke="#DDD6FE"/>
      <text x="95" y="20" text-anchor="middle" fill="#7C3AED">Ex-Salesforce Intern</text>
    </g>
    <g transform="translate(432,272)">
      <rect width="176" height="30" rx="15" fill="#FFFFFF" stroke="#BAE6FD"/>
      <text x="88" y="20" text-anchor="middle" fill="#0284C7">Oracle Java SE 17 (OCP)</text>
    </g>
  </g>
</svg>
